plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
}

android {
    namespace 'com.translator.webview'
    compileSdk 34

    defaultConfig {
        applicationId "com.translator.webview"
        minSdk 26
        targetSdk 34
        versionCode 2
        versionName "1.1"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
        debug {
            debuggable true
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    buildFeatures {
        viewBinding true
    }

    packagingOptions {
        resources {
            excludes += ['/META-INF/{AL2.0,LGPL2.1}']
        }
    }
}

dependencies {
    // AndroidX
    implementation 'androidx.core:core-ktx:1.12.0'
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.android.material:material:1.11.0'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
    implementation 'androidx.webkit:webkit:1.10.0'

    // ML Kit OCR — detects all text blocks in the captured screenshot
    implementation 'com.google.mlkit:text-recognition:16.0.0'

    // ML Kit Translate — on-device translation with 9-language selector
    // Includes: TranslateLanguage, TranslatorOptions, Translation, DownloadConditions
    implementation 'com.google.mlkit:translate:17.0.1'

    // Coroutines — off-thread ML Kit init to avoid ANR
    implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-android:1.7.3'
}
