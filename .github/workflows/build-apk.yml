name: Build YomuAI Debug APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build YomuAI APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Grant Gradle wrapper execute permission
        run: chmod +x gradlew

      - name: Inject Gemini API key into local.properties
        run: |
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> local.properties

      - name: Build YomuAI Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: Rename APK to YomuAI
        run: |
          mkdir -p release
          cp app/build/outputs/apk/debug/app-debug.apk release/YomuAI-debug.apk

      - name: Upload YomuAI Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: YomuAI-debug-apk
          path: release/YomuAI-debug.apk
          retention-days: 30

      - name: Show build summary
        run: |
          echo "========================================"
          echo "✅  YomuAI APK built successfully!"
          echo "========================================"
          ls -lh release/YomuAI-debug.apk
          echo ""
          echo "📦 Download: Actions tab → this run → Artifacts → YomuAI-debug-apk"
          echo "========================================"
